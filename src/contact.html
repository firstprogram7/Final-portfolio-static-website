<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link href="/dist/output.css" rel="stylesheet" />
    <title>Contact Me</title>
  </head>
  <body class="">
    <!-------------------- Dark mode toggle button ----------------->
    <section>
      <div class="flex justify-end px-4 pt-3">
        <div
          class="switch px-3 py-1 rounded-full space-x-2 max-w-20 bg-stone-100 hover:bg-stone-200 border border-stone-300 shadow-sm duration-300"
        >
          <i class="fa-regular fa-sun dark:text-stone-500 cursor-pointer"></i>
          <i class="fa-solid fa-moon text-stone-300 cursor-pointer"></i>
        </div>
      </div>
    </section>
    <!--------------------    Navigation bar    ----------------->
    <header id="main-header" class="sticky top-0 z-50 scroll-mt-20">
      <nav class="container mx-auto">
        <div class="flex justify-between items-center px-4 py-4">
          <a
            href="/index.html"
            id="logo"
            class="text-4xl font-bold md:text-5xl transistion-all duration-300 ease-in-out"
            >Shazid</a
          >
          <div id="nav-links" class="hidden lg:flex space-x-6">
            <a href="/index.html" class="md:text-xl lg:text-2xl transistion-all duration-150  ease-in-out">Home</a>
            <a href="/src/about.html" class="md:text-xl lg:text-2xl">About</a>
            <a
              href="#experience"
              class="hover:text-orange-400 md:text-xl lg:text-2xl"
              >Experience</a
            >
            <a
              href="#projects"
              class="hover:text-orange-400 md:text-xl lg:text-2xl"
              >Projects</a
            >
            <a
              href="./pages/blogs/blog-menu.html"
              class="hover:text-orange-400 md:text-xl lg:text-2xl"
              >Blogs</a
            >
            <a
              href="./contact.html"
              class="text-orange-400 md:text-xl lg:text-2xl"
              >Contact Me</a
            >
          </div>
          <button id="menu-btn" class="block relative w-12 h-12 lg:hidden">
            <span
              class="absolute left-0 top-1/2 w-8 h-0.5 bg-primary -translate-y-2 transition-all duration-300"
            ></span>
            <span
              class="absolute left-0 top-1/2 w-8 h-0.5 bg-primary transition-all duration-300"
            ></span>
            <span
              class="absolute left-0 top-1/2 w-8 h-0.5 bg-primary translate-y-2 transition-all duration-300"
            ></span>
          </button>
        </div>
        <div
          id="mobile-menu"
          class="absolute left-0 top-full w-full bg-[#f8fafc] shadow-lg py-10 px-6 space-y-6 text-lg text-center scale-y-0 font-bold transform origin-top transition-all duration-200 z-50"
        >
          <a href="/index.html" class="block hover:text-orange-400">Home</a>
          <a href="#about" class="block hover:text-orange-400">About</a>
          <a href="#experience" class="block hover:text-orange-400"
            >Experience</a
          >
          <a href="#projects" class="block hover:text-orange-400">Projects</a>
          <a
            href="./pages/blogs/blog-menu.html"
            class="block hover:text-orange-400"
            >Blogs</a
          >
          <a href="./contact.html" class="block hover:text-orange-400"
            >Contact Me</a
          >
        </div>
      </nav>
    </header>
    <!-- Contact form -->
    <section class="max-w-4xl mx-auto mt-20 space-y-4 px-10">
      <!-- Contact heading -->
      <h2
        class="text-xl text-center py-3 md:text-left md:text-2xl md:font-semibold"
      >
        Thanks for taking the time to reach out. Please submit your query and I
        will get back to you!
      </h2>
      <!-- Contact form-->
      <form action="/contact" method="POST">
        <!-- Container -->
        <div class="space-y-4">
          <!-- Name -->
          <div class="flex flex-col space-y-2">
            <label for="nameID" class="text-xl font-semibold">Name</label>
            <input
              type="text"
              id="nameID"
              name="name"
              placeholder="Enter Name"
              required
              class="text-gray-500 dark:bg-stone-700 ring-1 ring-slate-300 px-2 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            />
          </div>
          <!-- Email id -->
          <div class="flex flex-col space-y-2">
            <label for="emailID" class="text-xl font-semibold">Email</label>
            <input
              type="email"
              name="email"
              id="emailID"
              placeholder="Enter Email"
              required
              class="text-gray-500 ring-1 dark:bg-stone-700 ring-slate-300 px-2 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            />
          </div>
          <!-- Phone Number -->
          <div class="flex flex-col space-y-2">
            <label for="emailID" class="text-xl font-semibold"
              >Phone Number</label
            >
            <input
              type="phone"
              name="phone"
              id="phoneID"
              placeholder="Enter Phone Number"
              class="text-gray-500 ring-1 dark:bg-stone-700 ring-slate-300 px-2 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            />
          </div>

          <!-- Message -->
          <div class="flex flex-col space-y-2">
            <label for="messageID" class="text-xl font-semibold"
              >Tell Me Something Cool</label
            >
            <textarea
              name="message"
              id="messageID"
              cols="30"
              rows="10"
              placeholder="Message"
              required
              class="text-xl text-gray-500 dark:text-gray-300 dark:bg-stone-700 ring-1 ring-slate-300 px-2 py-3 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            ></textarea>
          </div>
        </div>
        <div class="flex justify-end my-3">
          <button
            type="submit"
            class="text-xl font-semibold text-white bg-blue-500 hover:bg-blue-600 px-6 py-2 w-full md:w-32 rounded-md focus:outline-none focus:ring-4 focus:ring:blue-300"
          >
            Send
          </button>
        </div>
      </form>
    </section>
    <!-- Footer Section -->
    <footer class="mt-20 mb-7">
      <div
        class="text-center grid grid-cols-2 md:space-x-10 gap-y-3 md:block text-2xl font-medium"
      >
        <a href="#about" class="hover:text-orange-400 duration-200">About</a>
        <a href="#experience" class="hover:text-orange-400 duration-200"
          >Experience</a
        >
        <a href="#" class="hover:text-orange-400 duration-200">Projects</a>
        <a
          href="./pages/blogs/blog-menu.html"
          class="hover:text-orange-400 duration-200"
          >Blogs</a
        >
      </div>
      <div class="text-center my-7 py-10 text-4xl md:text-5xl">
        <a href="https://github.com/firstprogram7"
          ><i class="fa-brands fa-github"></i
        ></a>
        <a href=""><i class="fa-brands fa-instagram"></i></a>
        <a href="https://www.linkedin.com/in/shazid-rahman/"
          ><i class="fa-brands fa-linkedin"></i
        ></a>
      </div>
      <p
        class="font-semibold text-textColorLight text-center mt-10 px-3 md:mt-14"
      >
        Copyright &copy 2025 Shazid. All rights reserved.
      </p>
    </footer>
    <script src="/main.js"></script>
  </body>
</html>
